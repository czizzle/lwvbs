<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#236c31">
<title>Living Word VBS Check-In</title>
<style>
  :root{
    --bg:#f4f1e6; --card:#ffffff; --ink:#20301c; --muted:#5f6b58;
    --line:#e6dfcc; --primary:#2e8b40; --primary-d:#236c31;
    --teal:#0f9aa6; --gold:#c78f1e; --navy:#1a344e;
    --green:#15803d; --green-bg:#e7f6ec; --amber:#b4780a; --amber-bg:#fdf2df;
    --red:#c62828; --red-bg:#fdeaea; --slate:#4b5546; --slate-bg:#eef1ea;
    --shadow:0 2px 10px rgba(30,45,20,.09);
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:18px; line-height:1.4;
    padding-bottom:env(safe-area-inset-bottom);
  }
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:20;color:#fff;
    background:linear-gradient(135deg,#2f8f40 0%,#1f7a4a 52%,#0f9aa6 100%);
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;box-shadow:0 2px 12px rgba(20,60,30,.22)}
  .topbar .row{display:flex;align-items:center;gap:12px}
  .topbar h1{font-size:17px;margin:0;font-weight:800;flex:1;line-height:1.2}
  .topbar .sub{font-size:12.5px;opacity:.92;margin-top:2px}
  .topmark{width:42px;height:42px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))}
  /* Home brand footer */
  .brandfoot{text-align:center;margin:26px 0 6px}
  .brandfoot img{width:210px;max-width:70%;opacity:.92}
  .brandfoot .tag{color:var(--gold);font-weight:700;font-size:13.5px;margin-top:6px}
  .backbtn{background:rgba(255,255,255,.18);border:0;color:#fff;font-size:22px;
    width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
  .daybadge{background:rgba(255,255,255,.18);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:600}
  .signoutbtn{background:rgba(255,255,255,.2);border:0;color:#fff;border-radius:10px;padding:6px 11px;
    font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .signoutbtn:active{background:rgba(255,255,255,.32)}
  /* Quick-nav: section jump links inside the sticky header */
  .topnav{display:flex;gap:7px;overflow-x:auto;margin-top:9px;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .topnav::-webkit-scrollbar{display:none}
  .topnavchip{flex:0 0 auto;background:rgba(255,255,255,.16);border:0;color:#fff;font-size:12.5px;
    font-weight:700;padding:7px 13px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .topnavchip:active{background:rgba(255,255,255,.34)}
  .sect{scroll-margin-top:150px}

  .content{flex:1;padding:16px}
  h2.sect{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:22px 4px 10px}

  /* Helper pill */
  .helper{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;box-shadow:var(--shadow);margin-bottom:14px}
  .helper label{font-size:13px;color:var(--muted);white-space:nowrap}
  .helper select{flex:1;font-size:17px;border:0;background:transparent;color:var(--ink);font-weight:600;padding:6px 2px}

  /* Stat grid */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer}
  .stat .n{font-size:34px;font-weight:800;line-height:1}
  .stat .l{font-size:13px;color:var(--muted);margin-top:6px;font-weight:600}
  .stat.green .n{color:var(--green)} .stat.slate .n{color:var(--slate)}
  .stat.amber .n{color:var(--amber)} .stat.primary .n{color:var(--primary)}

  .alertbar{margin-top:12px;background:var(--red-bg);border:1px solid #f3c9c9;color:var(--red);
    border-radius:14px;padding:12px 14px;font-weight:600;font-size:15px;display:flex;gap:8px;align-items:center}

  /* Big action buttons */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .act{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:700;font-size:16px}
  .act .ico{font-size:30px}
  .act:active{transform:scale(.98)}
  .act.wide{grid-column:1 / -1;flex-direction:row;justify-content:center;gap:12px;font-size:16px}
  .act.checkin{background:var(--green-bg);border-color:#c3e6cf}
  .act.checkout{background:#e7f0f6;border-color:#c9dcea}

  /* Home action cards — row layout with a subtitle so each card is self-explanatory */
  .homecard{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer}
  .homecard:active{transform:scale(.995)}
  .homecard .ico{font-size:24px;flex-shrink:0;width:30px;text-align:center}
  .homecard .body{flex:1;min-width:0}
  .homecard .t{font-weight:700;font-size:16px}
  .homecard .s{font-size:12.5px;color:var(--muted);margin-top:1px;line-height:1.3}
  .homecard .chev{color:#c4ccd4;font-size:22px;flex-shrink:0}
  .homecard.checkin{background:var(--green-bg);border-color:#c3e6cf}
  .homecard.checkout{background:#e7f0f6;border-color:#c9dcea}

  /* Crew rows */
  .crewline{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;margin-bottom:8px}
  .crewline .name{flex:1;font-weight:600}
  .crewline .cnt{color:var(--muted);font-size:14px}
  .dot{width:12px;height:12px;border-radius:50%}

  /* Search */
  .search{width:100%;font-size:18px;padding:14px 16px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);box-shadow:var(--shadow);margin-bottom:12px}

  /* Child rows */
  .list{display:flex;flex-direction:column;gap:10px}
  .kid{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px;box-shadow:var(--shadow);cursor:pointer;min-height:64px}
  .kid:active{transform:scale(.995)}
  .avatar{width:46px;height:46px;border-radius:50%;background:var(--grp,var(--slate-bg));color:var(--grp-ink,var(--slate));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
  .kid .info{flex:1;min-width:0}
  .kid .nm{font-weight:700;font-size:18px}
  .kid .meta{font-size:13px;color:var(--muted);margin-top:2px}
  .tag{display:inline-block;font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;margin-right:5px}
  .tag.grade{background:var(--slate-bg);color:var(--slate)}
  .tag.allergy{background:var(--red-bg);color:var(--red)}
  .tag.med{background:var(--amber-bg);color:var(--amber)}
  .status{font-size:13px;font-weight:800;padding:6px 12px;border-radius:20px;white-space:nowrap}
  .status.in{background:var(--green-bg);color:var(--green)}
  .status.out{background:var(--slate-bg);color:var(--slate)}
  .status.notin{background:#eef2f6;color:var(--muted)}
  .chev{color:#c4ccd4;font-size:22px}

  /* Anomaly flags — the ⚠️ next to a child's name + the review report */
  .flagchip{display:inline-flex;align-items:center;gap:2px;font-size:12.5px;font-weight:800;
    background:#fdf2df;color:#9a6400;border:1px solid #f0d9a8;border-radius:20px;padding:1px 7px;
    margin-left:4px;vertical-align:middle;cursor:pointer;line-height:1.5}
  .flagbox{border:1px solid #f0d9a8;background:#fffaf0;border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .flagbox.ok{border-color:#c3e6cf;background:#f2fbf5}
  .flagbox .ft{font-weight:800;font-size:14px;margin-bottom:2px}
  .flagbox .fm{font-size:14.5px;color:var(--slate)}
  .flagbox .fack{font-size:13px;color:var(--green);font-weight:700;margin-top:6px}
  .flagbox .fnote{width:100%;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-top:8px;background:#fff}
  .flagbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .flagbtns button{font-size:14px;font-weight:700;padding:9px 14px;border-radius:10px;border:0;cursor:pointer}
  .flagbtns .ack{background:var(--green);color:#fff}
  .flagbtns .reopen{background:var(--slate-bg);color:var(--slate)}
  .grouphd{font-size:14px;font-weight:800;margin:18px 4px 8px;display:flex;align-items:center;gap:8px}
  .grouphd .cnt{background:#fdf2df;color:#9a6400;border-radius:20px;padding:1px 9px;font-size:12.5px}
  /* Compact review rows: one line per person, actions on the right */
  .frow{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);
    border-radius:12px;margin-bottom:8px;background:var(--card)}
  .frow .fmain{flex:1;min-width:0}
  .frow .fname{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .frow .fsub{font-size:13px;color:var(--muted);margin-top:2px}
  .frow .factions{display:flex;gap:6px;flex-shrink:0}
  .frow .factions button{font-size:13.5px;font-weight:700;padding:8px 12px;border-radius:9px;border:0;cursor:pointer;white-space:nowrap}
  .frow .factions .ack{background:var(--green);color:#fff}
  .frow .factions .open{background:var(--slate-bg);color:var(--slate)}

  /* Control bar (group / sort / filter) + accordion groups */
  .ctrlbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .ctrlbar .ctl{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:5px 10px;font-size:12.5px;color:var(--muted)}
  .ctrlbar .ctl select{border:0;background:transparent;font-size:15px;font-weight:600;color:var(--ink);padding:2px}
  .ctrlbar .chip2{background:var(--slate-bg);color:var(--slate);border:0;border-radius:12px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer}
  .acc{margin-bottom:8px}
  .acchd{width:100%;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;font-size:16px;font-weight:700;color:var(--ink)}
  .acchd .car{color:var(--primary);font-size:14px;width:14px;flex-shrink:0}
  .acchd .swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .acchd .acctitle{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acchd .acccnt{background:var(--slate-bg);color:var(--slate);border-radius:20px;padding:1px 10px;font-size:13px;font-weight:800;flex-shrink:0}
  .accbody{padding:8px 0 2px}
  .accbody .kid{margin-bottom:8px}

  /* Director "see what they see" preview bar */
  .previewbar{position:sticky;top:0;z-index:19;background:#7e3ea8;color:#fff;text-align:center;
    padding:9px 14px;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .previewbar b{font-weight:800}
  .previewbar .x{background:rgba(255,255,255,.22);border-radius:8px;padding:2px 8px;font-size:12.5px;white-space:nowrap}
  .demobar{position:sticky;top:0;z-index:19;background:#c77f1a;color:#fff;text-align:center;
    padding:8px 14px;font-size:13px;font-weight:700;line-height:1.3}
  .rolerow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
  .rolerow.sel{border-color:var(--primary);background:#f2fbf5}
  .rolerow .em{font-size:22px}

  /* Internal team chat */
  .chatwrap{display:flex;flex-direction:column;gap:9px;padding-bottom:8px}
  .msg{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 13px;box-shadow:var(--shadow);max-width:90%;align-self:flex-start}
  .msg.mine{background:#e7f6ec;border-color:#c3e6cf;align-self:flex-end}
  .msg .mh{display:flex;gap:10px;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:2px}
  .msg .mh .who{font-weight:800;color:var(--slate)}
  .msg .mt{font-size:15.5px;white-space:pre-wrap;word-break:break-word;line-height:1.35}
  .chatbar{position:sticky;bottom:0;background:var(--bg);padding:10px 0 4px;display:flex;gap:8px}
  .chatbar textarea{flex:1;font-size:16px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--card);resize:none;min-height:46px;max-height:120px}
  .chatbar button{background:var(--primary);color:#fff;border:0;border-radius:12px;padding:0 18px;font-weight:800;font-size:16px;cursor:pointer}

  /* Calendar RSVP */
  .evt{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow)}
  .evt.mine{border-left:5px solid var(--primary)}
  .evt.dim{opacity:.6}
  .evt .et{font-weight:800;font-size:16px}
  .evt .ed{font-size:13.5px;color:var(--muted);margin-top:2px}
  .rsvpbtns{display:flex;gap:7px;margin-top:11px}
  .rsvpbtns button{flex:1;font-size:14px;font-weight:700;padding:9px 6px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--slate);cursor:pointer}
  .rsvpbtns button.on.going{background:var(--green);color:#fff;border-color:var(--green)}
  .rsvpbtns button.on.maybe{background:var(--gold);color:#fff;border-color:var(--gold)}
  .rsvpbtns button.on.no{background:var(--slate);color:#fff;border-color:var(--slate)}
  .attendrow{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.7}
  .pill2{display:inline-block;background:var(--slate-bg);color:var(--slate);border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700;margin:0 4px 4px 0}
  .pill2.going{background:var(--green-bg);color:var(--green)} .pill2.maybe{background:var(--amber-bg);color:var(--amber)}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:16px}

  /* Detail / confirm */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .panel h3{margin:0 0 4px;font-size:20px}
  .field{padding:10px 0;border-bottom:1px solid var(--line)}
  .field:last-child{border-bottom:0}
  .field .k{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
  .field .v{font-size:17px;margin-top:2px}
  .field .v.warn{color:var(--red);font-weight:600}
  .field .v.med{color:var(--amber);font-weight:600}

  .btn{display:block;width:100%;font-size:18px;font-weight:700;padding:16px;border-radius:14px;border:0;
    cursor:pointer;text-align:center;margin-top:10px}
  .btn.green{background:var(--green);color:#fff}
  .btn.blue{background:var(--primary);color:#fff}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn.red{background:var(--red);color:#fff}
  .btn:active{opacity:.92}

  .pick{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);
    border-radius:14px;padding:16px;margin-bottom:10px;font-size:17px;cursor:pointer}
  .pick.sel{border-color:var(--primary);background:#eef7fa}
  .pick .r{font-size:13px;color:var(--muted)}
  .pick .ph{font-size:14px;color:var(--primary);font-weight:600;margin-top:3px}

  /* Toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1c2530;color:#fff;
    padding:14px 18px;border-radius:14px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:60;max-width:90%;opacity:0;pointer-events:none;transition:opacity .2s}
  #toast.show{opacity:1;pointer-events:auto}
  #toast button{background:#3ea0b5;border:0;color:#fff;font-weight:800;padding:8px 12px;border-radius:10px;font-size:15px}

  /* Form */
  .form label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin:12px 2px 5px;text-transform:uppercase;letter-spacing:.03em}
  .form input,.form select,.form textarea{width:100%;font-size:17px;padding:13px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}
  .form textarea{min-height:70px;resize:vertical}
  .form .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chk{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:16px}
  .chk input{width:22px;height:22px}

  .banner{background:#fff7e6;border:1px solid #f0d9a8;color:#8a5a00;border-radius:12px;padding:10px 14px;font-size:13.5px;margin-bottom:14px;font-weight:600}

  /* Schedule + snack */
  .slot{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .slot .t{font-weight:800;font-size:17px}
  .slot.all{background:#eef7fa;border-color:#c9e4ec}
  .slot .lbl{color:var(--muted);font-size:14px;margin-top:2px}
  .assign{display:flex;flex-direction:column;gap:7px;margin-top:10px}
  .gchip{display:flex;align-items:center;gap:9px;background:#f4f6f8;border-radius:10px;padding:9px 11px;font-size:15px}
  .gchip .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
  .gchip .arw{color:var(--muted)}
  .snackcard{background:var(--card);border:1px solid var(--line);border-left:7px solid var(--primary);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .snackcard .hd{display:flex;align-items:center;gap:10px}
  .snackcard .grp{font-weight:800;font-size:19px;flex:1}
  .snackcard .cnt{font-size:13.5px;color:var(--muted);text-align:right}
  .snackcard .al{margin-top:10px;background:var(--red-bg);border-radius:10px;padding:9px 11px;font-size:14.5px;color:var(--red);line-height:1.5;font-weight:600}
  .snackcard .ok{margin-top:10px;color:var(--green);font-size:14.5px;font-weight:700}
  #sigpad{width:100%;height:190px;border:2px dashed var(--line);border-radius:12px;background:#fff;touch-action:none;display:block}

  /* Login */
  .login-wrap{min-height:64vh;display:flex;flex-direction:column;justify-content:center;padding:8px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:26px 22px;box-shadow:var(--shadow)}
  .login-card h2{margin:0 0 4px;font-size:22px;text-align:center}
  .login-card p{color:var(--muted);margin:0 0 18px;font-size:15px;text-align:center}
  .login-err{background:var(--red-bg);color:var(--red);border:1px solid #f3c9c9;border-radius:12px;padding:10px 12px;font-size:14px;font-weight:600;margin-bottom:12px}
  .login-logo{width:64px;height:64px;border-radius:18px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
  .info p{font-size:15px;color:var(--slate);margin:10px 0}
  .info code{background:#eef2f6;padding:2px 6px;border-radius:6px;font-size:14px}
  a.link{color:var(--primary);font-weight:600;text-decoration:none}

  /* v2 additions: roles, filters, dots, announcements, import */
  .rolechip{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:0;
    border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;margin-top:8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.14)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filters select{font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card);font-weight:600;color:var(--ink)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:8px 12px;cursor:pointer}
  .toggle input{width:20px;height:20px}
  .dotset{display:inline-flex;gap:4px;margin-left:2px;vertical-align:middle}

const FLAG_LABELS={duplicate:"Possible duplicate",underage:"Under age 4 at VBS",missing_grade:"Grade missing / unclear",missing_contact:"No phone on file"};

const GRADE_OK=["K4","K5","1","2","3","4","5"];
function normGradeJS(g){
  g=(g||"").trim(); if(!g) return "";
  const low=g.toLowerCase().replace(/\s/g,"");
  if(["4k","k4","prek","pre-k"].includes(low)) return "K4";
  if(["5k","k5","kindergarten","k"].includes(low)) return "K5";
  const m=low.match(/^(\d)(st|nd|rd|th)?grade?$/)||low.match(/^(\d)$/);
  return m?m[1]:g;
}
function baseName(f,l){ return (f||"").replace(/\(.*?\)/g,"").trim().toLowerCase()+"|"+(l||"").trim().toLowerCase(); }
// Normalize ALL-CAPS or all-lowercase names to Title case; leave mixed-case (McDonald, DeAngelo) alone.
function smartCaseName(s){
  s=(s||"").trim(); if(!s) return s;
  const seg=p=>p?p[0].toUpperCase()+p.slice(1).toLowerCase():p;
  return s.split(/\s+/).map(tok=>{
    const letters=tok.replace(/[^A-Za-z]/g,"");
    if(!letters||!(letters===letters.toUpperCase()||letters===letters.toLowerCase())) return tok;
    const t=tok.split("-").map(part=>part.split("'").map(seg).join("'")).join("-");
    return t.replace(/\bMc([a-z])/g,(m,c)=>"Mc"+c.toUpperCase());
  }).join(" ");
}
// Recompute every child's flags. Idempotent, and preserves any ack the
// director already made (matched by flag type). Mirrors private/build_roster.py.
function detectFlags(children){
  const idx={};
  children.forEach(c=>{ const k=baseName(c.first,c.last); (idx[k]=idx[k]||[]).push(c); });
  const ev=new Date(CONFIG.dates[0]+"T12:00:00");
  children.forEach(c=>{
    const keepAck={}; (c.flags||[]).forEach(f=>{ if(f.ack) keepAck[f.type]=f.ack; });
    const flags=[];
    const dupes=idx[baseName(c.first,c.last)];
    if(dupes.length>1) flags.push({type:"duplicate",level:"warn",msg:`Possible duplicate: this name is registered ${dupes.length} times. Confirm whether it's the same child.`,ack:keepAck.duplicate||null});
    if(c.dob){ const d=new Date(c.dob+"T12:00:00");
      if(!isNaN(d)){ let a=ev.getFullYear()-d.getFullYear();
        if(ev.getMonth()<d.getMonth()||(ev.getMonth()===d.getMonth()&&ev.getDate()<d.getDate())) a--;
        if(a<4){ const t4=new Date(d); t4.setFullYear(d.getFullYear()+4);
          flags.push({type:"underage",level:"warn",msg:`Turns 4 on ${t4.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"})} — only ${a} at VBS (program is age 4+).`,ack:keepAck.underage||null}); } } }
    if(!c.grade||!GRADE_OK.includes(c.grade)) flags.push({type:"missing_grade",level:"info",msg:(c.gradeRaw?`Grade "${c.gradeRaw}" wasn't recognized`:"Grade is blank")+" — set it before crew assignment.",ack:keepAck.missing_grade||null});
    const p=c.parent||{}, em=p.emergency||{};
    if(!(p.phone||"").trim()&&!(p.altPhone||"").trim()&&!(em.phone||"").trim()) flags.push({type:"missing_contact",level:"warn",msg:"No parent, alternate, or emergency phone on file.",ack:keepAck.missing_contact||null});
    c.flags=flags;
  });
  return children;
}

        return `<div class="frow"><div class="fmain">
          <div class="fname">${esc(fullName(recs[0]))}</div>
          <div class="fsub">${recs.length} records — compare ${links}</div></div>
          ${dir?`<div class="factions"><button class="ack" data-act="ackDup" data-ids="${ids}">✓ Same child</button></div>`:""}</div>`;
      }).join("");
      return `<div class="grouphd">${esc(FLAG_LABELS[t]||t)} <span class="cnt">${names.length}</span></div>${items}`;
    }
    if(t==="missing_contact"){
      const cdc=groups[t].filter(x=>x.c.attendsCDC), comm=groups[t].filter(x=>!x.c.attendsCDC);
      rowsTotal+=groups[t].length;
      const block=(label,arr)=>arr.length?submark(label,arr.length)+arr.map(({c})=>rowNon(c,t)).join(""):"";
      return `<div class="grouphd">${esc(FLAG_LABELS[t]||t)} <span class="cnt">${groups[t].length}</span></div>${block("CDC kids",cdc)}${block("Community kids",comm)}`;
    }
    rowsTotal+=groups[t].length;
    const items=groups[t].map(({c})=>rowNon(c,t)).join("");
    return `<div class="grouphd">${esc(FLAG_LABELS[t]||t)} <span class="cnt">${groups[t].length}</span></div>${items}`;
  }).join("");
  const ackedCount=DATA.children.reduce((n,c)=>n+ackedFlags(c).length,0);
  app.innerHTML = topbar("Review — Report for Todd", rowsTotal+" to review", true, false) + `
    <div class="content">
      <div class="banner">${active.length
        ? `Grouped by issue, one line per child. Tap ✓ Handled once you’ve confirmed or acted on it, or Open to fix it or add a note. Duplicates are joined, so you only clear each child once.`
        : `✅ Nothing needs review. Every data check is clear or already handled.`}</div>
      ${sections}
      ${ackedCount?`<div class="grouphd" style="margin-top:24px;color:var(--muted)">Already reviewed <span class="cnt" style="background:var(--green-bg);color:var(--green)">${ackedCount}</span></div>
        <p class="mini" style="margin:0 4px">Open a child to reopen one.</p>`:""}
    </div>`;
}

let toastT=null;
function toast(msg,undoFn){
  const t=document.getElementById("toast");
  t.innerHTML=esc(msg)+(undoFn?' <button data-undo>Undo</button>':'');
  t.classList.add("show");
  if(undoFn){t.querySelector("[data-undo]").onclick=()=>{clearTimeout(toastT);t.classList.remove("show");undoFn();};}

}

/* ---------- RSVP ---------- */
function rsvpOf(eventId){ return (DATA.rsvps[eventId]||{})[meKey()]||""; }
function rsvpCounts(eventId){ const m=DATA.rsvps[eventId]||{}, c={going:0,maybe:0,no:0}; Object.values(m).forEach(s=>{ if(c[s]!=null)c[s]++; }); return c; }
function rsvpNames(eventId,status){ const m=DATA.rsvps[eventId]||{}; return Object.keys(m).filter(k=>m[k]===status).map(volDisplay).sort((a,b)=>a.localeCompare(b)); }
function myEvents(){ const dated=CONFIG.eventCalendar.filter(e=>e.date); return dated.filter(e=>["going","maybe"].includes(rsvpOf(e.id))); }

/* ---------- live rotation: where is a crew / kid right now ---------- */
function nowMins(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function slotRange(s){ const m=(s.time||"").match(/(\d{1,2}):(\d{2}).*?(\d{1,2}):(\d{2})/); return m?[(+m[1])*60+(+m[2]),(+m[3])*60+(+m[4])]:null; }
function currentSlot(){ const mins=nowMins(); for(const s of CONFIG.schedule){ const r=slotRange(s); if(r&&mins>=r[0]&&mins<r[1]) return s; } return null; }
function stationForCrewAt(slot,crew){ if(!slot) return null; if(slot.all) return slot.station; return (slot.assign&&slot.assign[crew])||null; }
function whereIsNow(child){
  const slot=currentSlot();
  if(!slot) return {inSession:false};
  if(!child.crew) return {inSession:true, needCrew:true};
  return {inSession:true, station:stationForCrewAt(slot,child.crew), slot};
}

/* ---------- pickup text (SMS the parent on check-out) ----------
   Two paths, both live:
   • Auto — a Supabase Edge Function ("send-sms") sends from the VBS Twilio
     number. Preferred once deployed (supabase/functions/send-sms). Silent no-op
     if it isn't deployed yet, so check-out never blocks.
   • Manual — an sms: link opens the volunteer's own Messages app pre-filled.
     Always works with zero backend; shown on the child page for checked-out kids. */
function notifyPhone(c){ const p=c.parent||{}; if((p.phone||"").trim()) return p.phone;
  const g=guardiansFor(c).find(x=>x.phone); return g?g.phone:""; }
function parentLabel(c){ const p=c.parent||{}; const n=[p.first,p.last].filter(Boolean).join(" ").trim(); return n||"the parent"; }
function pickupMessage(c,gname){
  const t=new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
  return `${CONFIG.church.replace(/ Church$/,"")} VBS: ${fullName(c)} was signed out at ${t}${gname?` to ${gname}`:""}. Thanks!`;
}
function smsHref(phone,msg){ const e=toE164(phone); if(!e) return "";
  return "sms:"+e+(msg?("?&body="+encodeURIComponent(msg)):""); }
async function trySendSms(phone,msg){
  const e164=toE164(phone); if(!e164||!SB||!SB.functions) return false;
  try{
    const {data,error}=await SB.functions.invoke("send-sms",{body:{to:e164,message:msg}});
    if(error) return false;
    return !!(data&&(data.ok||data.sid));
  }catch(e){ return false; }
}

};

const VGROUPERS = {
  job:    {label:"Job", key:v=>v.role||ROLE_LABEL(v.roleKey), order:null},
  access: {label:"Access", key:v=>ACCESS_LABEL(v.roleKey), order:["Full access","Check-in / out","View only"]},

// Colour that "corresponds" to each group value — used for the header dot AND
// each child/volunteer avatar circle inside the group.
const GRADE_COLORS={K4:"#e0a72e",K5:"#3d8b40","1":"#2f6fb0","2":"#7e3ea8","3":"#e07b2e","4":"#0f9aa6","5":"#c0392b"};
const HUE_PALETTE=["#2f6fb0","#3d8b40","#e07b2e","#d6417f","#7e3ea8","#c0392b","#0f9aa6","#c78f1e","#5c6bc0","#8f979f"];
function hashIdx(s,n){ let h=0; for(let i=0;i<(s||"").length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%n; }
function inkFor(hex){ if(!hex||hex[0]!=="#"||hex.length<7) return "#fff";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)>150?"#20301c":"#fff"; }
function noneKey(k){ return !k || k[0]==="—" || k==="(none)"; }
GROUPERS.crew.color  = k=>CONFIG.crewColors[k]||"";
GROUPERS.room.color  = k=>noneKey(k)?"":HUE_PALETTE[hashIdx(k,HUE_PALETTE.length)];
GROUPERS.type.color  = k=>k==="CDC kids"?"#c78f1e":"#2f6fb0";
GROUPERS.none.color  = ()=>"";
VGROUPERS.job.color    = k=>HUE_PALETTE[hashIdx(k,HUE_PALETTE.length)];
VGROUPERS.access.color = k=>k==="Full access"?"#2e8b40":k==="Check-in / out"?"#2f6fb0":"#8f979f";
VGROUPERS.none.color   = ()=>"";
function groupersFor(kind){ return kind==="vol"?VGROUPERS:GROUPERS; }
function childSortCmp(a,b){ const s=state.sortBy._child||"last";
  if(s==="first") return (a.first||"").localeCompare(b.first||"")||(a.last||"").localeCompare(b.last||"");
  return (a.last||"").localeCompare(b.last||"")||(a.first||"").localeCompare(b.first||""); }
function volNameCmp(a,b){ return (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase()); }
function sortFor(kind){ return kind==="vol"?volNameCmp:childSortCmp; }
function defaultChildGroup(){ return DATA.children.filter(c=>c.crew).length>DATA.children.length/2?"crew":"none"; }
function curGroupBy(pg,dflt){ return state.groupBy[pg]||dflt; }
function isGroupOpen(pg,k){
  if((state.search||"").trim()) return true;
  const key=pg+"|"+k;
  if(state.openGroups[key]!==undefined) return state.openGroups[key];
  return state.groupAll&&state.groupAll[pg]==="open";
}
function groupControls(pg, kind, dflt){
  const defs=groupersFor(kind), gb=curGroupBy(pg,dflt);
  const gopts=Object.keys(defs).map(g=>`<option value="${g}" ${gb===g?"selected":""}>${defs[g].label}</option>`).join("");
  const ss=state.sortBy._child||"last";
  const sortCtl = kind==="child" ? `<label class="ctl"><span>Sort</span><select data-sortchild><option value="last" ${ss==="last"?"selected":""}>Last name</option><option value="first" ${ss==="first"?"selected":""}>First name</option></select></label>` : "";
  return `<div class="ctrlbar">
    <label class="ctl"><span>Group</span><select data-groupby="${pg}">${gopts}</select></label>
    ${sortCtl}
    <button class="chip2" data-act="expandAll" data-pg="${pg}">Expand all</button>
    <button class="chip2" data-act="collapseAll" data-pg="${pg}">Collapse all</button>
  </div>`;
}
function groupedList(pg, list, rowFn, kind, dflt){
  const defs=groupersFor(kind), gb=curGroupBy(pg,dflt), G=defs[gb];
  const sorted=[...list].sort(sortFor(kind));
  if(gb==="none"||!G) return `<div class="list">${sorted.map(rowFn).join("")||'<div class="empty">No matches.</div>'}</div>`;
  const map={}; sorted.forEach(x=>{ const k=G.key(x); (map[k]=map[k]||[]).push(x); });
  const keys=Object.keys(map).sort((a,b)=>{
    if(G.order){ const ia=G.order.indexOf(a), ib=G.order.indexOf(b); if(ia>=0||ib>=0) return (ia<0?999:ia)-(ib<0?999:ib); }
    return a.localeCompare(b);
  });
  const html=keys.map(k=>{
    const rows=map[k], open=isGroupOpen(pg,k);
    const col=G.color?G.color(k):"";
    const sw=col?`<span class="swatch" style="background:${col}"></span>`:"";
    const bodyStyle=col?` style="--grp:${col};--grp-ink:${inkFor(col)}"`:"";
    const title=G.fmt?G.fmt(k):k;
    return `<div class="acc"><div class="acchd" data-act="toggleGroup" data-pg="${pg}" data-g="${esc(k)}">
      <span class="car">${open?"▾":"▸"}</span>${sw}<span class="acctitle">${esc(title)}</span><span class="acccnt">${rows.length}</span></div>
      ${open?`<div class="accbody"${bodyStyle}>${rows.map(rowFn).join("")}</div>`:""}</div>`;
  }).join("");
  return html||'<div class="empty">No matches.</div>';
}

function renderStatList(){
  const day=state.day, kind=state.statKind||"in";
  let list, title;
  if(kind==="in"){ title="Here now"; list=sortedChildren().filter(c=>statusOf(c,day).code==="in"); }
  else if(kind==="out"){ title="Checked out"; list=sortedChildren().filter(c=>statusOf(c,day).code==="out"); }
  else if(kind==="notin"){ title="Not arrived"; list=sortedChildren().filter(c=>registeredForDay(c,day)&&statusOf(c,day).code==="notin"); }
  else { title="Registered today"; list=sortedChildren().filter(c=>registeredForDay(c,day)); }
  const rows=list.map(c=>childRow(c,"child")).join("") || `<div class="empty">Nobody in this list right now.</div>`;

function filterBar(opts){

function renderCheckList(mode){
  // Lock to real today during the event so nobody checks the wrong date.
  const locked = todayIsEventDay();
  if(locked) state.day=realToday();
  const day=state.day, q=state.search;
  let list=sortedChildren().filter(c=>{
    const s=statusOf(c,day).code;
    const base = (mode==="in"? (s!=="in"&&s!=="out"&&registeredForDay(c,day)) : s==="in");
    return base && matches(c,q) && passFilters(c);
  });
  if(mode==="out" && state.fCommunity) list=list.filter(isCommunity);

  const rowFn=c=>{
    return `<div class="kid" data-act="${mode==='in'?'doCheckin':'toCheckout'}" data-id="${c.id}">
      <div class="avatar">${esc(initials(c))}</div>
      <div class="info"><div class="nm">${esc(fullName(c))} ${dotset(c)}${flagBadge(c)}</div>
        <div class="meta">${esc(gradeLabel(c.grade))} · ${esc(c.crew)}${childRoom(c)?" · "+esc(childRoom(c)):""}
          ${c.allergies?`<span class="tag allergy">⚠ ${esc(c.allergies.split(" ")[0])}</span>`:""}</div></div>
      ${mode==='in'?'<span class="chev">＋</span>':'<span class="status in">Tap to check out</span>'}
    </div>`;
  };
  const dflt="none";
  const pg=mode==='in'?"checkin":"checkout";
  const dayCtl = locked
    ? `<span class="lock">📆 Today only — ${dayName(realToday())}</span>`
    : "";
  app.innerHTML = topbar(mode==='in'?"Check In":"Check Out", dayName(day), true, !locked) + `
    <div class="content">
      ${helperBar()}
      ${dayCtl?`<div style="margin-bottom:12px">${dayCtl}</div>`:""}
      <input class="search" placeholder="Search a child's name or room…" value="${esc(q)}" data-search>
      ${filterBar({community: mode==="out"})}
      ${mode==='in'
        ? `<div class="banner" style="background:#e7f6ec;border-color:#c3e6cf;color:#0b5c2e">Tap a name to check the child IN. ${list.length} waiting. Dots: <span class="ndot red"></span> no photos · <span class="ndot yellow"></span> allergy · <span class="ndot blue"></span> community.</div>`

      ${groupControls(pg,"child",dflt)}
      ${groupedList(pg, list, rowFn, "child", dflt)}
    </div>`;
  focusSearch();
}

function renderMyDay(){
  const st=myStation();
  if(!st){ app.innerHTML=topbar("My day","",true,false)+`
    <div class="content"><div class="banner">Your role doesn't run a rotation station, so there's no personal rotation to show. This view is for Bible, Games, Crafts, Sticky Scripture, and Snacks leaders.</div></div>`; return; }
  const anyCrews=DATA.children.filter(c=>c.crew).length>0;
  // Leader allergy card — every child with an allergy/medical note in a crew that
  // rotates to this station, so the leader sees the risks before the crews arrive.
  const myCrews=new Set();
  CONFIG.schedule.forEach(s=>{ if(s.all){ if(s.station===st) CONFIG.crews.forEach(cr=>myCrews.add(cr)); }
    else if(s.assign){ CONFIG.crews.forEach(cr=>{ if(s.assign[cr]===st) myCrews.add(cr); }); } });
  const flagged=sortedChildren().filter(c=>c.crew&&myCrews.has(c.crew)&&hasAlert(c));
  const allergyCard = flagged.length ? `
    <div class="allergycard">
      <div class="ac-hd">⚠️ Allergy &amp; medical — ${flagged.length} kid${flagged.length>1?"s":""} coming to you</div>
      ${flagged.map(c=>`<div class="ac-row" data-act="child" data-id="${c.id}">
        <span class="dot" style="background:${CONFIG.crewColors[c.crew]||'#999'}"></span>
        <div style="flex:1"><b>${esc(fullName(c))}</b> <span class="mini">${esc(c.crew)} crew</span>
          <div class="ac-detail">${esc([c.allergies,c.medical].filter(Boolean).join("  ·  "))}</div></div>
        <span class="chev">›</span></div>`).join("")}
    </div>` : "";
  const rows=CONFIG.schedule.map(s=>{
    if(s.all){ return s.station===st?`<div class="slot all"><div class="t">🕐 ${esc(s.time)}</div><div class="lbl">${esc(s.label||"")} — everyone's with you</div></div>`:""; }
    const crews=CONFIG.crews.filter(cr=>s.assign&&s.assign[cr]===st);
    if(!crews.length) return "";
    const body=crews.map(cr=>{
      const kids=sortedChildren().filter(c=>c.crew===cr);
      const kidLinks=kids.map(k=>`<a class="link" data-act="child" data-id="${k.id}">${hasAlert(k)?"⚠️ ":""}${esc(k.first)} ${esc((k.last[0]||""))}.</a> <span class="mini">${esc(/^K/.test(k.grade)?k.grade:"Gr "+k.grade)}</span>`).join(" · ");
      return `<div style="margin-top:8px"><span class="dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${CONFIG.crewColors[cr]||'#999'}"></span> <a class="link" data-act="crewList" data-crew="${esc(cr)}"><b>${esc(cr)} crew</b></a> (${kids.length} kids)${kids.length?`<div style="margin-top:3px;line-height:1.9">${kidLinks}</div>`:""}</div>`;
    }).join("");
    return `<div class="slot"><div class="t">🕐 ${esc(s.time)} · ${esc(s.label||"")}</div>${body}</div>`;
  }).join("");
  app.innerHTML = topbar("My day", st, true, true)+`
    <div class="content">
      <div class="banner">Your station: <b>${esc(st)}</b>${locFor(st)?` (${esc(locFor(st))})`:""}. Here's who rotates to you and when — tap any name or crew for details.</div>
      ${allergyCard}
      ${anyCrews?rows:`<div class="empty">Crews aren't assigned yet. Once the director sets crews, you'll see each crew's kids here, in the order they come to you.</div>`}
    </div>`;
}

// Director/leader live view: who is at each station right now.
function renderStationBoard(){
  if(todayIsEventDay()) state.day=realToday();
  const slot=currentSlot();
  const present=c=>statusOf(c,state.day).code==="in";
  const hereKids=DATA.children.filter(present);
  const anyCrews=DATA.children.filter(c=>c.crew).length>0;

  // one crew's present kids as clickable chips, allergy kids marked
  const kidChips=cr=>{
    const list=sortedChildren().filter(c=>c.crew===cr&&present(c));
    if(!list.length) return `<span class="mini">none checked in yet</span>`;
    return `<div class="kidwrap">${list.map(k=>`<a class="link" data-act="child" data-id="${k.id}">${hasAlert(k)?"⚠️ ":""}${esc(k.first)} ${esc((k.last[0]||""))}.</a>`).join(" · ")}</div>`;
  };
  const crewLine=cr=>{
    const n=sortedChildren().filter(c=>c.crew===cr&&present(c));
    const al=n.filter(hasAlert).length;
    return `<div class="bcrew"><span class="dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${CONFIG.crewColors[cr]||'#999'}"></span>
      <a class="link" data-act="crewList" data-crew="${esc(cr)}"><b>${esc(cr)}</b></a> <span class="mini">(${n.length} here${al?`, ${al} allergy`:""})</span>
      ${al?`<span class="bwarn">⚠️ ${al}</span>`:""}${kidChips(cr)}</div>`;
  };

  let cards="";
  if(slot && slot.all){
    // Everyone together (opening / snack / closing)
    const al=hereKids.filter(hasAlert).length;
    cards = `<div class="boardcard ${/snack|treat/i.test(slot.station||slot.label||"")?"snack":""}">
      <div class="bh"><div class="bt">${esc(slot.station||slot.label||"All together")}</div>
        <div class="bcount">${hereKids.length} here${al?` · ⚠️ ${al}`:""}</div></div>
      ${locFor(slot.station)?`<div class="bloc">${esc(locFor(slot.station))}</div>`:""}
      <div class="mini" style="margin-top:6px">${esc(slot.label||"")} — every crew is together right now.</div>
      ${CONFIG.crews.map(crewLine).join("")}</div>`;
  } else if(slot){
    // Rotation — one card per station
    cards = CONFIG.stations.map(stn=>{
      const crews=CONFIG.crews.filter(cr=>stationForCrewAt(slot,cr)===stn);
      const kids=sortedChildren().filter(c=>crews.includes(c.crew)&&present(c));
      const al=kids.filter(hasAlert).length;
      return `<div class="boardcard">
        <div class="bh"><div class="bt">${esc(stn)}</div>
          <div class="bcount">${kids.length} here${al?` · ⚠️ ${al}`:""}</div></div>
        ${locFor(stn)?`<div class="bloc">${esc(locFor(stn))}</div>`:""}
        ${crews.length?crews.map(crewLine).join(""):`<div class="mini" style="margin-top:8px">No crew here this rotation.</div>`}</div>`;
    }).join("");
  }

  const bar = slot
    ? `<div class="nowbar">🕐 Right now · ${esc(slot.time)} — ${esc(slot.label||slot.station||"")}</div>`
    : `<div class="nowbar" style="background:var(--slate-bg);border-color:var(--line);color:var(--slate)">VBS isn't in a rotation right now (runs 9:00–11:30). Showing who's checked in by crew.</div>`;

  // Out of session: fall back to a by-crew present list.
  if(!slot){ cards = anyCrews ? CONFIG.crews.map(cr=>{
      const kids=sortedChildren().filter(c=>c.crew===cr&&present(c));
      const al=kids.filter(hasAlert).length;
      return `<div class="boardcard"><div class="bh"><div class="bt">${esc(cr)} crew</div>
        <div class="bcount">${kids.length} here${al?` · ⚠️ ${al}`:""}</div></div>${kidChips(cr)}</div>`;
    }).join("") : `<div class="empty">No crews assigned yet.</div>`; }

  app.innerHTML = topbar("Station board", hereKids.length+" kids here now", true, true) + `
    <div class="content">
      ${bar}
      ${anyCrews?"":`<div class="banner">Crews aren't assigned yet — assign each child a crew (Edit child) and the board fills in automatically.</div>`}
      ${cards||`<div class="empty">Nobody is checked in right now.</div>`}
    </div>`;
}

function renderCalendar(){
  const fmtD = d => new Date(d+"T12:00:00").toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
  const dated = CONFIG.eventCalendar.filter(e=>e.date).sort((a,b)=>a.date.localeCompare(b.date));
  const dir = isDirector();
  const who = meKey();
  const attendRow=(e)=>{
    const g=rsvpNames(e.id,"going"), m=rsvpNames(e.id,"maybe"), n=rsvpNames(e.id,"no");
    if(!g.length&&!m.length&&!n.length) return `<div class="attendrow">No RSVPs yet.</div>`;
    const pills=(arr,cls)=>arr.map(x=>`<span class="pill2 ${cls}">${esc(x)}</span>`).join("");
    return `<div class="attendrow">
      ${g.length?`<div><b>Going (${g.length}):</b> ${pills(g,"going")}</div>`:""}
      ${m.length?`<div><b>Maybe (${m.length}):</b> ${pills(m,"maybe")}</div>`:""}
      ${n.length?`<div style="color:var(--muted)"><b>Can't (${n.length}):</b> ${pills(n,"")}</div>`:""}
    </div>`;
  };
  const evtCard=(e,dim)=>{
    const isVbs=CONFIG.dates.includes(e.date);
    const sub=[e.time,e.location,e.note].filter(Boolean).map(esc).join(" · ");
    const my=rsvpOf(e.id), counts=rsvpCounts(e.id);
    const rsvpBtns = who ? `<div class="rsvpbtns">
        <button class="${my==='going'?'on going':''}" data-act="rsvp" data-ev="${e.id}" data-s="going">✅ Going</button>
        <button class="${my==='maybe'?'on maybe':''}" data-act="rsvp" data-ev="${e.id}" data-s="maybe">🤔 Maybe</button>
        <button class="${my==='no'?'on no':''}" data-act="rsvp" data-ev="${e.id}" data-s="no">✖ Can't</button>
      </div>` : "";
    const attend = dir ? attendRow(e) : (counts.going||counts.maybe?`<div class="attendrow">👥 ${counts.going} going${counts.maybe?` · ${counts.maybe} maybe`:""}</div>`:"");
    return `<div class="evt ${(my==='going'||my==='maybe')?'mine':''} ${dim?'dim':''}">
      <div class="et">${isVbs?"🌿 ":""}${esc(e.title)}</div>
      <div class="ed">${fmtD(e.date)}${sub?" · "+sub:""}</div>
      ${attend}
      ${rsvpBtns}
    </div>`;
  };
  const mine = dated.filter(e=>["going","maybe"].includes(rsvpOf(e.id)));
  const others = dated.filter(e=>!["going","maybe"].includes(rsvpOf(e.id)));
  app.innerHTML = topbar("Event Calendar", CONFIG.eventName, true, false) + `
    <div class="content">
      <div class="banner">${who
        ? `RSVPing as <b>${esc(meName())}</b>. Your events show at the top; the rest are below — tap Going / Maybe / Can't on each.`
        : `Setup, the four mornings, teardown, and the celebration. ${LIVE?"Sign in":"Pick <b>your name</b> below"} to RSVP as yourself.`}</div>
      ${(!who&&!LIVE)?helperBar():""}
      ${mine.length?`<h2 class="sect">✅ My events (${mine.length})</h2>${mine.map(e=>evtCard(e,false)).join("")}`:""}
      <h2 class="sect">${mine.length?"Other events":"All events"}${who?" — tap to RSVP":""}</h2>
      ${others.map(e=>evtCard(e, who&&mine.length>0)).join("") || `<div class="empty">You're RSVP'd to everything. 🎉</div>`}
    </div>`;
}

let sigPad=null;
function initSigPad(){
  const canvas=document.getElementById("sigpad"); if(!canvas)return;
  const ratio=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=Math.max(1,rect.width*ratio); canvas.height=Math.max(1,rect.height*ratio);
  const ctx=canvas.getContext("2d"); ctx.scale(ratio,ratio);
  ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#12303f";
  let drawing=false,last=null,dirty=false;
  const pos=e=>{const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left),y:(e.clientY-r.top)};};
  const start=e=>{drawing=true;last=pos(e);dirty=true;e.preventDefault();};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;e.preventDefault();};
  const end=()=>{drawing=false;};
  canvas.addEventListener("pointerdown",start);
  canvas.addEventListener("pointermove",move);
  window.addEventListener("pointerup",end);
  sigPad={clear:()=>{ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;},isDirty:()=>dirty,dataUrl:()=>canvas.toDataURL("image/png")};
}

async function sendMagicLink(){
  const emailEl=document.getElementById("lg_email");
  const email=(emailEl&&emailEl.value||"").trim().toLowerCase();
  if(!email){ renderLogin("Enter your email."); return; }
  if(!SB){ renderLogin("Sign-in isn't switched on yet."); return; }
  try{
    // shouldCreateUser:false — only volunteers the director provisioned can sign in.
    const {error}=await SB.auth.signInWithOtp({email, options:{shouldCreateUser:false, emailRedirectTo:window.location.href.split("#")[0]}});
    if(error && /not allowed|signups|user/i.test(error.message||"")){
      renderLogin("That email isn't set up for the app yet. Ask your director to add you."); return;
    }
    if(error){ renderLogin(error.message||"Couldn't send the link. Check wifi and try again."); return; }
    state.magicSent=email; renderLogin();
  }catch(err){ renderLogin("Couldn't send the link. Check wifi and try again."); }
}
async function sendPhoneCode(){
  const el=document.getElementById("lg_phone");
  const e164=toE164((el&&el.value)||"");
  state.loginMode="phone";
  if(!e164){ renderLogin("Enter a 10-digit U.S. mobile number."); return; }
  if(!SB){ renderLogin("Sign-in isn't switched on yet."); return; }
  try{
    // shouldCreateUser:false — only numbers the director provisioned can sign in.
    const {error}=await SB.auth.signInWithOtp({phone:e164, options:{shouldCreateUser:false}});
    const msg=(error&&error.message)||"";
    if(error && /provider|unsupported|disabled|not enabled/i.test(msg)){
      renderLogin("Text sign-in isn't switched on yet — use the ✉️ Email link option for now."); return;
    }
    if(error && /not allowed|signups|not ?found|user/i.test(msg)){
      renderLogin("That number isn't set up yet. Ask your director to add it, or use the email option."); return;
    }
    if(error){ renderLogin(msg||"Couldn't send the code. Check the number and try again."); return; }
    state.otpSent=e164; renderLogin();
  }catch(err){ renderLogin("Couldn't send the code. Check wifi and try again."); }
}
async function verifyPhoneCode(){
  const el=document.getElementById("lg_code");
  const token=((el&&el.value)||"").replace(/\D/g,"");
  if(token.length<6){ renderLogin("Enter the 6-digit code from the text."); return; }
  try{
    const {data,error}=await SB.auth.verifyOtp({phone:state.otpSent, token, type:"sms"});
    if(error){ renderLogin("That code didn't match. Check it and try again, or resend."); return; }
    authed=true;
    state.currentUser=sessionUserKey(data&&data.user)||state.otpSent;
    state.otpSent=""; state.magicSent="";
    await db.loadAll(); go("home");
  }catch(err){ renderLogin("Couldn't verify the code. Try again."); }
}
async function doLogout(){
  try{ await SB.auth.signOut(); }catch(e){}
  authed=false; state.currentUser=null; state.magicSent=""; state.otpSent=""; state.loginMode="email"; renderLogin();
}

function normHead(h){ return String(h||"").toLowerCase().replace(/[^a-z0-9]/g,""); }
const IMPORT_MAP=[
  {test:h=>/^(child)?first(name)?$/.test(h)||h==="firstname", set:(c,v)=>c.first=v},
  {test:h=>/^(child)?last(name)?$/.test(h)||h==="lastname", set:(c,v)=>c.last=v},
  {test:h=>h==="grade", set:(c,v)=>c.grade=v},

  {test:h=>h.includes("daysattending")||h==="days", set:(c,v)=>c.days=parseDays(v)},

  {test:h=>h.includes("medical"), set:(c,v)=>c.medical=v},

  {test:h=>h.includes("parentlast"), set:(c,v)=>c.parent.last=v},
  {test:h=>h.includes("parentemail")||h==="email", set:(c,v)=>c.parent.email=v},
  {test:h=>h.includes("parentphone")||(h.includes("phone")&&!h.includes("alt")&&!h.includes("emergency")), set:(c,v)=>c.parent.phone=v},
  {test:h=>h.includes("alternatephone")||h.includes("altphone")||h.includes("parentalternate"), set:(c,v)=>c.parent.altPhone=v},
  {test:h=>h.includes("street"), set:(c,v)=>c.parent.street=v},
  {test:h=>h.includes("city"), set:(c,v)=>c.parent.city=v},
  {test:h=>h==="state"||h.includes("parentstate"), set:(c,v)=>c.parent.state=v},
  {test:h=>h.includes("zip"), set:(c,v)=>c.parent.zip=v},
  {test:h=>h.includes("emergencycontactname")||h.includes("emergencyname"), set:(c,v)=>c.parent.emergency.name=v},
  {test:h=>h.includes("emergencycontactrelationship")||h.includes("emergencyrelationship"), set:(c,v)=>c.parent.emergency.relationship=v},
  {test:h=>h.includes("emergencycontactphone")||h.includes("emergencyphone"), set:(c,v)=>c.parent.emergency.phone=v},
  {test:h=>h.includes("alternatepickupname")||h.includes("altpickupname")||h.includes("pickupname"), set:(c,v)=>c.parent.altPickup.name=v},
  {test:h=>h.includes("alternatepickupphone")||h.includes("altpickupphone")||h.includes("pickupphone"), set:(c,v)=>c.parent.altPickup.phone=v}
];
function parseDays(v){ const out=[]; const s=String(v).toLowerCase(); [["mon","Mon"],["tue","Tue"],["wed","Wed"],["thu","Thu"]].forEach(([k,d])=>{if(s.includes(k))out.push(d);}); return out.length?out:["Mon","Tue","Wed","Thu"]; }
function splitRows(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  const delim = (lines[0]||"").indexOf("\t")>=0 ? "\t" : ",";
  return lines.map(l=>{
    if(delim==="\t") return l.split("\t");
    const out=[];let cur="",q=false;
    for(let i=0;i<l.length;i++){const ch=l[i];
      if(q){ if(ch==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch===','){out.push(cur);cur="";} else if(ch==='"'){q=true;} else cur+=ch; }
    } out.push(cur); return out;
  });
}
function isoDate(v){ v=(v||"").trim(); let m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[3]}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;
  if(/^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10); return ""; }
// The real Google Form: one row per FAMILY, parent block + up to 4 child blocks.
function parseWideForm(rows,norm){
  const gi=rx=>norm.findIndex(h=>rx.test(h));
  const P={email:gi(/^email/),pfirst:gi(/^parentfirst/),plast:gi(/^parentlast/),street:gi(/^parentstreet/),
    city:gi(/^parentcity/),state:gi(/^parentstate/),zip:gi(/^parentzip/),phone1:gi(/^contactphone1/),phone2:gi(/^contactphone2/),
    ename:gi(/emergencycontactname/),erel:gi(/emergencycontactrelationship/),ephone:gi(/emergencycontactphone/),
    apname:gi(/(alternate|alt)pickupname/),apphone:gi(/(alternate|alt)pickupphone/),media:gi(/^mediarelease/)};
  const cc=n=>({first:gi(new RegExp("^child"+n+"first")),last:gi(new RegExp("^child"+n+"last")),
    grade:gi(new RegExp("^child"+n+"grade")),dob:gi(new RegExp("^child"+n+"dateofbirth")),gender:gi(new RegExp("^child"+n+"gender")),
    days:gi(new RegExp("^dateschild"+n)),cdc:gi(new RegExp("^child"+n+".*(childdevelopmentcenter|cdc)")),all:gi(new RegExp("^child"+n+"allergies"))});
  const CC={1:cc(1),2:cc(2),3:cc(3),4:cc(4)};
  const yn=v=>/^(y|yes|true|1)/i.test(v||"");
  const children=[]; let fam=0;
  for(let r=1;r<rows.length;r++){
    const cells=rows[r]; if(!cells.join("").trim()) continue;
    fam++; const fid="f"+fam;
    const g=i=>(i>=0&&i<cells.length?String(cells[i]||"").trim():"");
    const parent={first:smartCaseName(g(P.pfirst)),last:smartCaseName(g(P.plast)),email:g(P.email),phone:g(P.phone1),altPhone:g(P.phone2),
      street:g(P.street),city:g(P.city)||"Jackson",state:g(P.state)||"WI",zip:g(P.zip),
      photoConsent:/^yes/i.test(g(P.media)),emergency:{name:smartCaseName(g(P.ename)),relationship:g(P.erel),phone:g(P.ephone)},
      altPickup:{name:smartCaseName(g(P.apname)),phone:g(P.apphone)}};
    let k=0;
    for(const n of [1,2,3,4]){ const x=CC[n]; const first=smartCaseName(g(x.first)),last=smartCaseName(g(x.last)); if(!first&&!last) continue; k++;
      const gradeRaw=g(x.grade);
      children.push({id:fid+"k"+k,familyId:fid,first,last,grade:normGradeJS(gradeRaw),gradeRaw,gender:g(x.gender),
        dob:isoDate(g(x.dob)),crew:"",attendsCDC:yn(g(x.cdc)),cdcRoom:"",community:!yn(g(x.cdc)),days:parseDays(g(x.days)),
        allergies:g(x.all),medical:"",comments:"",parent,extraPickups:[],consent:null,flags:[]});
    }
  }
  return children;
}
// Fallback: the older flat "one child per row" paste.
function parseFlatForm(rows,headers,norm){
  const mappers=norm.map(h=>IMPORT_MAP.find(m=>m.test(h))||null);
  const unmapped=headers.filter((h,i)=>!mappers[i]);
  const byEmail={}; const children=[];
  for(let r=1;r<rows.length;r++){
    const cells=rows[r]; if(!cells.join("").trim()) continue;
    const c={id:uid(),familyId:"",first:"",last:"",grade:"",gradeRaw:"",gender:"",dob:"",crew:"",attendsCDC:false,cdcRoom:"",community:true,days:["Mon","Tue","Wed","Thu"],allergies:"",medical:"",comments:"",
      parent:{first:"",last:"",email:"",phone:"",altPhone:"",street:"",city:"",state:"",zip:"",photoConsent:true,emergency:{name:"",relationship:"",phone:""},altPickup:{name:"",phone:""}},extraPickups:[],consent:null,flags:[]};
    headers.forEach((h,i)=>{ const m=mappers[i]; if(m) m.set(c,(cells[i]||"").trim()); });
    if(!c.first&&!c.last) continue;
    c.gradeRaw=c.grade; c.grade=normGradeJS(c.grade);
    c.first=smartCaseName(c.first); c.last=smartCaseName(c.last);
    c.parent.first=smartCaseName(c.parent.first); c.parent.last=smartCaseName(c.parent.last);
    if(c.parent.emergency) c.parent.emergency.name=smartCaseName(c.parent.emergency.name);
    if(c.parent.altPickup) c.parent.altPickup.name=smartCaseName(c.parent.altPickup.name);
    c.community=!c.attendsCDC;
    if(!c.parent.first&&!c.parent.last&&(c.parent.email)){ c.parent.last=c.last; }
    const key=(c.parent.email||"").toLowerCase();
    if(key){ if(!byEmail[key]) byEmail[key]=uid(); c.familyId=byEmail[key]; } else c.familyId=uid();
    children.push(c);
  }
  return {children,unmapped};
}
function parseImport(text){
  const rows=splitRows(text); if(rows.length<2) return {children:[],headers:[],unmapped:[]};
  const headers=rows[0].map(h=>h.trim());
  const norm=headers.map(normHead);
  const wide = norm.some(h=>/^child1first/.test(h));
  let children, unmapped=[];
  if(wide){ children=parseWideForm(rows,norm); }
  else { const res=parseFlatForm(rows,headers,norm); children=res.children; unmapped=res.unmapped; }
  detectFlags(children);
  return {children,headers,unmapped};
}

        const ph=notifyPhone(c);
        if(ph){
          const sent=await trySendSms(ph, pickupMessage(c,g?g.name:""));
          if(sent){ await db.logActivity({at:nowISO(),user:actor(),action:"Texted pickup confirmation to "+parentLabel(c)+" for "+fullName(c)}); smsNote=" · 📱 parent texted"; }
          else smsNote=" · open "+c.first+" to text parent";
        }
      }
      go("checkout");
      toast("👋 "+fullName(c)+" released to "+(g?g.name:"guardian")+smsNote);
      break;
    }
    case "undoCheckinConfirm": {
      const c=DATA.children.find(x=>x.id===id); if(!c) break;
      await db.undoCheckIn(c.id,state.day);
      await db.logActivity({at:nowISO(),user:actor(),action:"Undid check-in for "+fullName(c)});
      go("checkout"); toast("↩️ Check-in undone for "+fullName(c));
      break;
    }

    case "saveChild": {
      const child=collectChildForm();
      if(!child.first||!child.last){toast("Please enter first and last name");break;}
      const isNewChild=!(state.editChild&&state.editChild.id);
      const apply=(document.getElementById("p_apply")||{}).checked;
      await db.saveChild(child, apply);
      await db.logActivity({at:nowISO(),user:actor(),action:(isNewChild?"Added":"Edited")+" child: "+fullName(child)});
      go(isNewChild?"roster":"child",{selChild:child.id}); toast("Saved "+fullName(child));
      break;
    }
    case "saveVol": {
      const name=(document.getElementById("vname")||{}).value.trim();
      if(!name){toast("Enter a name");break;}
      const roleKey=(document.getElementById("vrolekey")||{}).value||"volunteer";
      await db.saveVolunteer({name,roleKey,role:ROLE_LABEL(roleKey),email:(document.getElementById("vemail")||{}).value.trim(),phone:(document.getElementById("vphone")||{}).value.trim(),days:["Mon","Tue","Wed","Thu"]});
      go("volunteers"); toast("Added "+name);
      break;
    }

    case "saveLoc": {
      const map={};
      document.querySelectorAll(".f_loc").forEach(inp=>{ map[inp.getAttribute("data-station")]=inp.value.trim(); });
      await db.saveScheduleLoc(map);
      go("schedule"); toast("Locations saved");
      break;
    }

    case "postAnn": {
      const txt=(document.getElementById("ann_text")||{}).value.trim();
      const img=(document.getElementById("ann_img")||{}).value.trim();
      if(!txt){ toast("Write something first"); break; }
      await db.saveAnnouncement({id:uid(),at:nowISO(),by:actor(),text:txt,image:img});
      await db.logActivity({at:nowISO(),user:actor(),action:"Posted an announcement"});
      go("announcements"); toast("📣 Posted");
      break;
    }
    case "delAnn": { await db.deleteAnnouncement(id); render(); toast("Deleted"); break; }

    case "dlSummary": exportSummary(); break;
    case "dlFull": exportFull(); break;
    case "printStats": printStatsSheet(); break;
    case "printToday": printToday(); break;
    case "printByCrew": printByCrewFor(state.day,false); break;
    case "printAll": printAllAZ(); break;
    case "printAllCrew": printByCrewFor(state.day,true); break;
    case "printDetail": printDetail(); break;
    case "printDay": state.day=el.getAttribute("data-d"); printByCrewFor(state.day,false); break;
    case "printAllergies": printAllergiesList(); break;
    case "printSnack": printSnackSheet(); break;

    case "impSample": {
      const el2=document.getElementById("imp_data");
      if(el2) el2.value="First Name\tLast Name\tGrade\tCrew\tAttends CDC\tCDC Room\tDays Attending\tAllergies\tMedical\tParent First\tParent Last\tParent Email\tParent Phone\tEmergency Contact Name\tEmergency Contact Phone\tPhoto Information\n"+
        "Ella\tRoth\t1\tPink\tNo\t\tMon, Tue, Wed, Thu\tPeanuts\t\tMegan\tRoth\tmegan.roth@example.com\t262-555-0301\tDrew Roth\t262-555-0302\tYes\n"+
        "Sam\tRoth\t3\tYellow\tYes\tRoom 6\tMon, Wed\t\t\tMegan\tRoth\tmegan.roth@example.com\t262-555-0301\tDrew Roth\t262-555-0302\tYes";
      break;
    }
    case "impPreview": {
      const text=(document.getElementById("imp_data")||{}).value||"";
      lastImport=parseImport(text);
      const out=document.getElementById("imp_out");
      if(!lastImport.children.length){ out.innerHTML='<div class="banner" style="background:var(--red-bg);border-color:#f3c9c9;color:var(--red)">No child rows found. Include a header row and at least one child.</div>'; break; }
      const fams=new Set(lastImport.children.map(c=>c.familyId)).size;
      const flagged=lastImport.children.filter(c=>(c.flags||[]).length).length;
      const sample=lastImport.children.slice(0,6).map(c=>`<div class="field"><div class="k">${esc(c.crew||"(no crew yet)")}${c.attendsCDC?" · CDC "+esc(c.cdcRoom||""):" · Community"}</div><div class="v">${esc(fullName(c))}${(c.flags||[]).length?" ⚠️":""} — ${esc(gradeLabel(c.grade||"?"))}${c.allergies?" · ⚠️ "+esc(c.allergies):""}${c.parent.email?" · "+esc(c.parent.email):""}</div></div>`).join("");
      out.innerHTML=`<div class="panel" style="margin-top:14px"><h3 style="font-size:16px">Preview: ${lastImport.children.length} children in ${fams} famil${fams===1?"y":"ies"}</h3>
        ${flagged?`<div class="banner" style="background:var(--amber-bg);border-color:#f0d9a8;color:#8a5a00">⚠️ ${flagged} need a look after import — they'll show in the Review report for Todd.</div>`:""}
        ${sample}${lastImport.children.length>6?`<div class="mini" style="margin-top:8px">…and ${lastImport.children.length-6} more</div>`:""}
        ${lastImport.unmapped.length?`<div class="banner" style="margin-top:10px;background:var(--amber-bg);border-color:#f0d9a8;color:#8a5a00">Columns I didn't recognize (ignored): ${esc(lastImport.unmapped.join(", "))}</div>`:""}
        <button class="btn blue" data-act="impConfirm">✅ Import these ${lastImport.children.length} children</button></div>`;
      break;
    }
    case "impConfirm": {
      if(!lastImport||!lastImport.children.length){ toast("Nothing to import"); break; }
      await db.importChildren(lastImport.children);
      await db.logActivity({at:nowISO(),user:actor(),action:"Imported "+lastImport.children.length+" children from spreadsheet"});
      const n=lastImport.children.length; lastImport=null;
      go("roster"); toast("Imported "+n+" children");
      break;
    }

    case "ackFlag": {
      const c=DATA.children.find(x=>x.id===id); if(!c) break;
      const ft=el.getAttribute("data-ft");
      const f=(c.flags||[]).find(x=>x.type===ft); if(!f) break;
      const noteEl=document.getElementById("note_"+id+"_"+ft);
      f.ack={by:actor(),at:nowISO(),note:noteEl?noteEl.value.trim():""};
      await db.saveChild(c);
      await db.logActivity({at:nowISO(),user:actor(),action:"Reviewed “"+(FLAG_LABELS[ft]||ft)+"” for "+fullName(c)+(f.ack.note?": "+f.ack.note:"")});
      render(); toast("✓ Marked reviewed");
      break;
    }
    case "reopenFlag": {
      const c=DATA.children.find(x=>x.id===id); if(!c) break;
      const ft=el.getAttribute("data-ft");
      const f=(c.flags||[]).find(x=>x.type===ft); if(!f) break;
      f.ack=null; await db.saveChild(c); render(); toast("Reopened");
      break;
    }
    case "ackDup": {
      const ids=(el.getAttribute("data-ids")||"").split(",").filter(Boolean);
      let nm="";
      for(const cid of ids){ const c=DATA.children.find(x=>x.id===cid); if(!c) continue; nm=fullName(c);
        const f=(c.flags||[]).find(x=>x.type==="duplicate"); if(f){ f.ack={by:actor(),at:nowISO(),note:"Confirmed — same child"}; await db.saveChild(c); } }
      await db.logActivity({at:nowISO(),user:actor(),action:"Reviewed duplicate: "+nm});
      render(); toast("✓ Marked reviewed");
      break;
    }
    case "loadReal": {
      if(LIVE){ toast("Live mode loads from the cloud"); break; }
      if(!window.__VBS_REAL_ROSTER){ toast("No real roster file found"); break; }
      const r=window.__VBS_REAL_ROSTER;
      const kids=detectFlags(JSON.parse(JSON.stringify(r.children)));
      const vols=JSON.parse(JSON.stringify(r.volunteers));
      await db.replaceRoster(kids, vols);
      go("home"); toast("Loaded "+kids.length+" children + "+vols.length+" volunteers");
      break;
    }
    case "printRoster": printToday(); break;
    case "resetDemo": localStorage.removeItem(DEMO_KEY); state.realLoaded=false; await db.loadAll(); go("home"); toast("Demo reset"); break;
    case "magicLink": await sendMagicLink(); break;
    case "magicReset": state.magicSent=""; renderLogin(); break;
    case "loginMode": state.loginMode=el.getAttribute("data-m"); renderLogin(); break;
    case "phoneCode": await sendPhoneCode(); break;
    case "verifyCode": await verifyPhoneCode(); break;
    case "otpReset": state.otpSent=""; renderLogin(); break;
    case "signout": await doLogout(); break;
  }
});

function prevView(){
  const v=state.view;
  if(v==="child") return "roster";
  if(v==="editChild") return state.editChild?"child":"roster";
  if(v==="consent") return "child";
  if(v==="activity") return "info";
  if(v==="import") return "info";
  if(v==="reports") return "roster";
  if(v==="scheduleLoc") return "schedule";
  if(v==="statList") return "home";
  if(v==="crewList") return "home";
  if(v==="myday") return "home";
  if(v==="board") return "home";
  if(v==="flags") return "home";
  if(v==="chat") return "home";
  if(v==="checkoutConfirm") return "checkout";
  if(["checkin","checkout","roster","allergies","schedule","kitchen","calendar","volunteers","info","pickday","announcements","export","rolepick"].includes(v)) return "home";
  return "home";
}

/* ============================================================
   INIT
   ============================================================ */
(async function init(){
  if(!LIVE && location.search.includes("preview=login")){ renderLogin("Preview only — this is the live sign-in screen."); return; }

  if(LIVE){
    try{
      await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2");
      SB=window.supabase.createClient(CONFIG.supabaseUrl,CONFIG.supabaseAnonKey);
      db=liveDB;
      SB.auth.onAuthStateChange((_e,s)=>{ authed=!!s; if(s&&s.user) state.currentUser=sessionUserKey(s.user); });
      const {data}=await SB.auth.getSession();
      // Clean the magic-link tokens out of the URL after they've been consumed.
      if(location.hash.includes("access_token")||location.hash.includes("error=")){
        history.replaceState(null,"",location.pathname+location.search);
      }
      if(!(data&&data.session)){ renderLogin(); return; }
      authed=true; state.currentUser=sessionUserKey(data.session.user);
    }catch(err){ console.warn("Supabase init failed, demo fallback",err); db=demoDB; }
  }
  await db.loadAll();
  render();
})();
</script>
